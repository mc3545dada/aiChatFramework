<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>AI Chat</h1>
      <button id="settings-btn" title="设置">&#9881;</button>
    </header>

    <main id="chat-container">
      <div id="messages"></div>
      <div id="loading" class="hidden">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </main>

    <footer>
      <form id="chat-form">
        <textarea
          id="user-input"
          rows="1"
          placeholder="输入消息，Enter 发送，Shift+Enter 换行..."
        ></textarea>
        <button type="submit" id="send-btn">发送</button>
      </form>
    </footer>
  </div>

  <!-- 设置弹窗 -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-modal">
      <div class="modal-header">
        <h2>设置</h2>
        <button id="settings-close">&times;</button>
      </div>
      <div class="modal-body">
        <label>
          API 地址
          <input id="setting-url" type="text" placeholder="https://api.openai.com">
        </label>
        <label>
          模型
          <input id="setting-model" type="text" placeholder="gpt-3.5-turbo">
        </label>
        <label>
          API 密钥
          <input id="setting-key" type="password" placeholder="sk-...">
        </label>
        <p class="hint">修改后自动保存，重启服务后仍然有效</p>
      </div>
      <div class="modal-footer">
        <button id="settings-save" class="btn-primary">保存</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
